<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Heimdex</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Quando alguém acessa /heimdex-frontend/cadastros diretamente,
    // o GitHub Pages serve este 404.html. Este script redireciona
    // preservando o path para o index.html processar via React Router.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + // mantém o /nome-do-repo
      '/?p=/' + l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  Redirecionando...
</body>
</html>
