# ===============================================
# CONFIGURAÇÕES DO SERVIDOR
# ===============================================
server.port=${PORT:10000}

# ===============================================
# BANCO DE DADOS (HÍBRIDO)
# ===============================================
# Se DB_URL existir (Nuvem), usa MySQL. Caso contrário, usa H2 local.
spring.datasource.url=jdbc:h2:file:./data/heimdexdb;DB_CLOSE_DELAY=-1
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# Dialeto JPA dinâmico
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ===============================================
# CONSOLE H2 (Apenas para uso local)
# ===============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===============================================
# JPA / HIBERNATE
# ===============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.schema_update.unique_constraint_strategy=RECREATE_QUIETLY

# ===============================================
# CLOUDINARY
# ===============================================
cloudinary.cloud_name=${CLOUDINARY_NAME:dkreomuo2}
cloudinary.api_key=${CLOUDINARY_KEY:498376488395782}
cloudinary.api_secret=${CLOUDINARY_SECRET:NZ1_93_649Re9Dftb35fpRdN35U}

# ===============================================
# UPLOAD DE ARQUIVOS
# ===============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================================
# MONITORAMENTO
# ===============================================
management.endpoints.web.exposure.include=health

app.qrcode.dir=src/main/resources/static/uploads/qrcodes
app.qrcode.base-url=/uploads/qrcodes