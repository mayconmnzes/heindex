# ========================================
# CONFIGURAÇÃO DO SERVIDOR
# ========================================
server.port=${PORT:10000}

# ========================================
# CONFIGURAÇÃO DE BANCO DE DADOS
# ========================================

# MySQL (Produção - Aiven)
# As variáveis DB_URL, DB_USER, DB_PASSWORD devem estar configuradas no Render
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# Driver MySQL (usado quando DB_URL contém mysql)
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Disable data.sql initialization (causes issues when tables don't exist yet)
spring.sql.init.mode=never

# H2 Console (apenas desenvolvimento - quando MySQL não está disponível)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================================
# CLOUDINARY
# ========================================
cloudinary.cloud_name=${CLOUDINARY_NAME:default}
cloudinary.api_key=${CLOUDINARY_KEY:000000000000000}
cloudinary.api_secret=${CLOUDINARY_SECRET:default_secret}

# ========================================
# UPLOAD DE ARQUIVOS
# ========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# MONITORAMENTO (Actuator)
# ========================================
management.endpoints.web.exposure.include=health

# ========================================
# LOGS
# ========================================
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.zaxxer.hikari=INFO
