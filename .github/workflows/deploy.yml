name: Deploy Heimdex Frontend → GitHub Pages

on:
  push:
    branches:
      - main  # Dispara quando fizer push na branch main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: heimdex-frontend/package-lock.json

      - name: Instalar dependências
        working-directory: ./heimdex-frontend
        run: npm ci

      - name: Build do projeto
        working-directory: ./heimdex-frontend
        env:
          # URL do seu backend no Render (já existente, não muda)
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do build
        uses: actions/upload-pages-artifact@v3
        with:
          path: './heimdex-frontend/dist'

      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
